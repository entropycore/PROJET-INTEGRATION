---
- name: Configurer le serveur applicatif
  hosts: web
  become: yes
  vars:
    dockerhub_username: "votre-utilisateur" # laissez-les vides si l’image est publique.
    dockerhub_password: "votre-motdepasse-ou-token"
    app_image: "votreutilisateur/backend:latest"
    app_port: "3000"

  tasks:
    # 1. Pré-requis système
    - name: Installer les paquets nécessaires (Docker, Git)
      yum:
        name:
          - docker
          - git
        state: present
        update_cache: yes

    - name: Démarrer et activer Docker au démarrage
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur ec2-user au groupe docker
      user:
        name: ec2-user
        groups: docker
        append: yes
      # Le changement de groupe ne prend effet qu'à la prochaine connexion
      # mais Docker CLI peut être utilisé avec become: yes par la suite.

    # 2. Authentification Docker Hub (si images privées)
    - name: Se connecter à Docker Hub
      docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
      when: dockerhub_username != "" and dockerhub_password != ""

    # 3. Pull de l'image et lancement du conteneur
    - name: Puller l'image applicative depuis Docker Hub
      docker_image:
        name: "{{ app_image }}"
        source: pull
        force_source: yes

    - name: Lancer (ou redéployer) le conteneur applicatif
      docker_container:
        name: mon-app
        image: "{{ app_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:3000"  # hôte:conteneur
        env:
          NODE_ENV: "production"
        # Ajoutez d'autres variables d'environnement si nécessaire
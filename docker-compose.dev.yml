version: "3.8"
services:
  db:
    image: postgres:15
    container_name: base_donnees
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev_back
    depends_on:
      - db
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public"
      PORT: 3000 
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev     
    ports:
      - "${BACKEND_PORT}:3000"


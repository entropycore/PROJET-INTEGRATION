services:
  db:
    image: postgres:15-alpine
    container_name: base_donnees
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT:-5433}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - credencia_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: dev_back
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      DIRECT_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      PORT: 3000

    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

    ports:
      - "${BACKEND_PORT:-3000}:3000"

    # seulement node_modules en volume
    volumes:
      - backend_node_modules:/app/node_modules

    networks:
      - credencia_net

    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - dist/
            - .git/
            - prisma/ 
            
        - action: rebuild
          path: ./backend/prisma/schema.prisma

        - action: rebuild
          path: ./backend/package.json

        - action: rebuild
          path: ./backend/package-lock.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: dev_front
    restart: unless-stopped

    depends_on:
      - backend

    env_file:
      - .env

    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3000}

    command: npm run dev -- --host

    ports:
      - "${FRONTEND_PORT:-5173}:5173"

    # seulement node_modules en volume
    volumes:
      - frontend_node_modules:/app/node_modules

    networks:
      - credencia_net

    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - dist/
            - .git/

        - action: rebuild
          path: ./frontend/package.json

        - action: rebuild
          path: ./frontend/package-lock.json

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  credencia_net:
    driver: bridge

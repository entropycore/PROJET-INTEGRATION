name: CI pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend audit
        run: npm audit --audit-level=high 

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests 
        run: npm test

      - name: Build frontend app
        run: npm run build 

      - name: Build frontend Docker image
        run: docker build -t credencia-frontend .

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
      
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: credencia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
    defaults:
      run:
        working-directory: backend
      
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/credencia_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/credencia_test
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
            
      - name: Install backend dependencies
        run: npm install
      
      - name: Run backend audit
        run: npm audit --audit-level=high 

      - name: Generate Prisma client
        run: npx prisma generate
      
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
      
      - name: Run backend unit tests 
        run: npm run test:unit
               
      - name: Run backend integration tests
        run: npm run test:integration

      - name: Build backend Docker image
        run: docker build -t credencia-backend .